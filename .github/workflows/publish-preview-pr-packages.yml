name: Publish Preview Pull Requests

on:
  pull_request_target:
    types: [opened, reopened, synchronize, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write

env:
  PREVIEW_LABEL: preview

jobs:
  publish:
    if: contains(github.event.pull_request.labels.*.name, env.PREVIEW_LABEL)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build publishable package
        run: pnpm build

      - name: Publish preview packages
        run: pnpm dlx pkg-pr-new publish --pnpm --packageManager=pnpm .
